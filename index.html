<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Tajawal:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --green: #00ff88; --green-border: rgba(0,255,136,0.2); --bg: #080c10; --card: rgba(12,18,24,0.9); --text: #c8d8e8; --muted: #3a5a4a; --yellow: #ffd700; --blue: #00aaff; }

  body::after { content: ''; position: fixed; top: -2px; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, var(--green), transparent); animation: scanline 4s linear infinite; z-index: 999; opacity: 0.5; pointer-events: none; }

  @keyframes skullPulse { 0%,100%{opacity:0.15;} 50%{opacity:0.25;} }

  .lesson-footer { display: flex; justify-content: space-between; font-size: 11px; }

  .bar-col { flex: 1; display: flex; align-items: flex-end; }
  .bar-fill { width: 100%; min-height: 4px; background: linear-gradient(180deg, var(--green), #004422); box-shadow: 0 0 6px rgba(0,255,136,0.3); }
  .bars-days { display: flex; justify-content: space-between; font-size: 9px; color: #2a4a3a; }
